name: Publish With gradle to GitHub Packages

# Controls when the action will run.
on:
  release:
    types:
      - published

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  publish-github:
    name: Publish Project (GitHub Packages)
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: 17
          architecture: x64

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Publish to GitHub Packages with Gradle
        run: gradle publish -x signMavenJavaPublication
        env:
          ADEMPIERE_LIBRARY_VERSION: ${{ github.event.release.tag_name }}
          ORG_GRADLE_PROJECT_deployPublishUrl: "https://maven.pkg.github.com/${{ github.repository }}"
          ORG_GRADLE_PROJECT_deployUsername: "${{ github.actor }}"
          ORG_GRADLE_PROJECT_deployPassword: "${{ secrets.GITHUB_TOKEN }}"
